<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Reasonix · TUI redesign — Ink-realistic</title>
<style>
/* ============================================================
   Ink-realistic version. Every effect here CAN be rendered to a
   terminal via Ink:
     · truecolor fg/bg per cell
     · Unicode box-drawing borders (no radius)
     · char-based progress bars
     · frame-swap spinners (steps())
     · streaming reveal
     · cell-by-cell gradient (gradientCells)

   Stripped (NOT achievable in Ink):
     · backdrop-filter / blur                   → opacity dim only
     · box-shadow / glow                        → double-border or accent line
     · radial / linear gradient backgrounds     → solid colors
     · transform: translateY / scale            → instant fade
     · cubic-bezier easing                      → linear or steps()
     · :hover                                   → removed (only .selected)
     · border-radius                            → 0 (terminals are rectangular)
     · conic-gradient                           → text counter or char rotation
   ============================================================ */
:root {
  --grad-1:#5eead4; --grad-2:#67e8f9; --grad-3:#7dd3fc; --grad-4:#93c5fd;
  --grad-5:#a5b4fc; --grad-6:#c4b5fd; --grad-7:#d8b4fe; --grad-8:#f0abfc;
  --primary:#67e8f9; --accent:#c4b5fd; --brand:#5eead4;
  --user:#67e8f9; --assistant:#86efac; --tool:#fcd34d; --tool-err:#fda4af;
  --info:#94a3b8; --warn:#fbbf24; --err:#f87171; --ok:#4ade80;

  --bg-canvas:#070a10;
  --bg-shell:#0b1019;
  --bg-elev:#161f2c;
  --bg-sel:#1a2433;          /* selected state — Ink's inverse equivalent */
  --line:#1c2433;
  --line-soft:#141b27;

  --fg-strong:#e6edf6;
  --fg:#cbd5e1;
  --fg-dim:#94a3b8;
  --fg-faint:#64748b;
  --fg-ghost:#475569;

  --mono: "JetBrains Mono", "SF Mono", "Cascadia Code", ui-monospace, Consolas, Menlo, monospace;
}

* { box-sizing:border-box; }
html, body { margin:0; padding:0; height:100%; background:#0a0e14; color:var(--fg); font-family:var(--mono); font-size:13px; line-height:1.4; }

/* page */
.shell { max-width:1380px; margin:0 auto; padding:24px; display:grid; grid-template-columns:240px 1fr; gap:24px; }
.headline { grid-column:1/-1; display:flex; align-items:baseline; gap:14px; margin-bottom:6px; }
.headline h1 { margin:0; font-size:18px; font-weight:600; color:var(--fg-strong); }
.headline h1 .mark {
  /* gradient wordmark — Ink does this via gradientCells, char-by-char color */
  background:linear-gradient(90deg,var(--grad-1),var(--grad-2),var(--grad-3),var(--grad-4),var(--grad-5),var(--grad-6),var(--grad-7),var(--grad-8));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.headline .sub { color:var(--fg-faint); font-size:12px; }
.headline .compare { margin-left:auto; color:var(--fg-faint); font-size:11px; }
.headline .compare a { color:var(--accent); text-decoration:none; }

/* sidebar */
.sidebar {
  background:var(--bg-shell); border:1px solid var(--line);
  padding:8px 6px; height:fit-content; position:sticky; top:24px;
  max-height:calc(100vh - 48px); overflow-y:auto;
  font-size:12px;
}
.sidebar::-webkit-scrollbar { width:6px; } .sidebar::-webkit-scrollbar-thumb { background:var(--bg-sel); }
.sidebar h3 { margin:12px 0 3px; padding:0 8px; font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-faint); }
.sidebar h3:first-child { margin-top:2px; }
.sidebar .item {
  display:block; padding:4px 8px;
  color:var(--fg-dim); cursor:pointer;
  /* no transition — instant like Ink re-render */
}
.sidebar .item.active { color:var(--fg-strong); background:var(--bg-sel); }
.sidebar .item .glyph { color:var(--accent); margin-right:6px; opacity:.7; }
.sidebar .item.active .glyph { opacity:1; color:var(--primary); }
.sidebar .meta { padding:8px 8px 4px; color:var(--fg-ghost); font-size:11px; line-height:1.4; }

/* term — flat rectangle, no shadow/radius. Ink terminals are 1px box-bordered. */
.term {
  background:var(--bg-shell);
  border:1px solid var(--line);
  height:720px;
  display:flex; flex-direction:column;
  position:relative;
  overflow:hidden;
}

/* topbar — single line, like Ink's status row at top */
.topbar {
  display:flex; align-items:center; gap:0;
  padding:0 8px; height:22px;
  border-bottom:1px solid var(--line-soft);
  font-size:12px;
  white-space:nowrap; overflow:hidden;
}
.topbar > * { flex-shrink:0; }
.topbar .gap { width:14px; flex-shrink:1; }
.topbar .sep { color:var(--fg-ghost); padding:0 6px; }
.topbar .brand { color:var(--fg-strong); font-weight:600; }
.topbar .brand .glyph {
  background:linear-gradient(90deg,var(--grad-1),var(--grad-2),var(--grad-3),var(--grad-4),var(--grad-5),var(--grad-6),var(--grad-7),var(--grad-8));
  -webkit-background-clip:text; background-clip:text; color:transparent;
  margin-right:4px;
}
.topbar .root { color:var(--fg); }
.topbar .session { color:var(--fg-dim); }
.topbar .spacer { flex:1; }

/* pills — bracketed text, no bg fill (Ink-style) */
.pill {
  font-size:11px; padding:0 4px; color:var(--fg-dim);
  display:inline-flex; align-items:center;
}
.pill .lb { color:var(--fg-ghost); }
.pill .rb { color:var(--fg-ghost); margin-left:1px; }
.pill .num { color:var(--fg-strong); font-variant-numeric:tabular-nums; }
.pill .sub { color:var(--fg-ghost); }
.pill.mode-review { color:var(--fg-dim); }
.pill.mode-auto   { color:var(--primary); }
.pill.mode-yolo   { color:var(--accent); }
.pill.cost { color:var(--ok); }
.pill.cost.warn { color:var(--warn); }
.pill.cost.err  { color:var(--err); animation: cap-blink 1s steps(2) infinite; }
@keyframes cap-blink { 50% { opacity:.55; } }
.pill.cache .bar { color:var(--primary); margin:0 4px; }
.pill.cache .bar .dim { color:var(--bg-sel); }
.pill.plan-mode { color:var(--accent); }
.pill.dashboard { color:var(--brand); }
.pill.update { color:var(--accent); }

/* log */
.log { flex:1; overflow-y:auto; padding:6px 0 6px; }
.log::-webkit-scrollbar { width:6px; } .log::-webkit-scrollbar-thumb { background:var(--bg-sel); }

/* turn — replaces card. Just a left accent bar (1 cell) + content rows.
   This is exactly what Ink renders today: a colored ▎ glyph in column 0,
   then content. No card border, no rounded corners. */
.turn {
  display:grid; grid-template-columns:14px 1fr; gap:0;
  padding:0 12px; margin:0 0 4px;
  /* Fade-only entrance — no slide. Steps to mimic Ink's discrete redraws. */
  animation: fade-step 240ms steps(3) both;
}
@keyframes fade-step { from { opacity:0; } to { opacity:1; } }

.turn .bar {
  color:var(--accent-bar, var(--info));
  font-weight:600;
  user-select:none;
  text-align:left;
}
.turn .bar::before { content:"▎"; }   /* Unicode 1/8 block, 1 cell wide */
.turn.user      { --accent-bar: var(--user); }
.turn.assistant { --accent-bar: var(--assistant); }
.turn.system    { --accent-bar: var(--info); }
.turn.tool      { --accent-bar: var(--tool); }
.turn.error     { --accent-bar: var(--err); }
.turn.warn      { --accent-bar: var(--warn); }

.turn-content { min-width:0; }
.turn-head { display:flex; gap:8px; align-items:baseline; font-size:11px; color:var(--fg-faint); }
.turn-head .who { color:var(--fg); font-weight:600; }
.turn-head .who .glyph { margin-right:4px; }
.turn.user      .turn-head .who .glyph { color:var(--user); }
.turn.assistant .turn-head .who .glyph { color:var(--assistant); }
.turn.system    .turn-head .who .glyph { color:var(--info); }
.turn.tool      .turn-head .who .glyph { color:var(--tool); }
.turn.warn      .turn-head .who .glyph { color:var(--warn); }
.turn.error     .turn-head .who .glyph { color:var(--err); }
.turn-head .meta { color:var(--fg-ghost); margin-left:auto; display:flex; gap:8px; }
.turn-head .meta .badge { color:var(--accent); }
.turn-head .meta .badge.r1 { color:var(--accent); }
.turn-head .meta .badge.mcp { color:var(--brand); }
.turn-head .meta .model { color:var(--fg-dim); }

.turn-body { color:var(--fg); white-space:pre-wrap; word-wrap:break-word; padding-top:1px; }
.turn-body code {
  /* No bg fill — just colored mono. Ink's chalk equivalent. */
  color:var(--primary);
}

/* tools — single row each. Glyph + name + args + status. No card, no hover. */
.tools { display:flex; flex-direction:column; }
.tool {
  display:flex; gap:8px;
  font-size:12px; color:var(--fg-dim);
  padding:0;
}
.tool .ico { width:1ch; flex-shrink:0; }
.tool.ok .ico  { color:var(--tool); }
.tool.err .ico { color:var(--tool-err); }
.tool.run .ico { color:var(--primary); }
.tool .name { color:var(--fg); }
.tool .args { color:var(--fg-faint); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tool .stat { color:var(--fg-ghost); font-size:11px; }
.tool .badge { color:var(--brand); }

/* expanded tool body — indented, no card, just dim text */
.tool-body { color:var(--fg-dim); font-size:12px; padding-left:1ch; border-left:1px solid var(--line-soft); margin:1px 0 2px; padding-left:9px; }
.tool-body pre { margin:0; white-space:pre-wrap; }

/* spinner glyph — frame-swap via steps() */
.spinner {
  display:inline-block; width:1ch;
  /* JS will rotate the content via setInterval (Ink: setState every 200ms) */
}

/* streaming cursor — Ink uses a similar blink */
.turn.streaming .turn-body::after {
  content:"▌"; display:inline-block;
  color:var(--primary);
  animation: blink 900ms steps(2,end) infinite;
}
@keyframes blink { 50% { opacity:0; } }

/* thinking — replaced shimmer with character-cycling. Real Ink uses a
   moving block char ▒▒▒░░░░░ that shifts position. */
.thinking { font-size:11px; color:var(--fg-faint); display:flex; gap:8px; align-items:baseline; }
.thinking .marquee {
  /* Render 12 cells; JS rotates the visible window. */
  color:var(--primary); letter-spacing:0;
}

/* R1 reasoning — collapsed by default, dim text under the assistant turn */
.reasoning {
  color:var(--fg-dim); font-size:12px;
  padding-left:1ch;
  border-left:1px solid rgba(196,181,253,.25);
  margin:1px 0 3px; padding:0 0 0 9px;
}
.reasoning .h { color:var(--accent); font-size:11px; }
.reasoning .body { color:var(--fg-dim); }

/* diff — row-by-row bg color. Ink can do this directly (Box bg). */
.diff { margin:1px 0 2px; font-size:12px; }
.diff .h { color:var(--fg-dim); padding:0; }
.diff .h .path { color:var(--fg); }
.diff .h .stats { margin-left:8px; }
.diff .h .stats .add { color:var(--ok); }
.diff .h .stats .del { color:var(--err); }
.diff pre { margin:0; }
.diff .ln { display:flex; gap:0; padding:0; line-height:1.4; }
.diff .ln .gut { width:4ch; color:var(--fg-ghost); text-align:right; user-select:none; padding-right:1ch; flex-shrink:0; }
.diff .ln .sg { width:1ch; flex-shrink:0; }
.diff .ln.add { background:rgba(74,222,128,.10); }
.diff .ln.add .gut, .diff .ln.add .sg { color:var(--ok); }
.diff .ln.add .sg::before { content:"+"; }
.diff .ln.del { background:rgba(248,113,113,.09); }
.diff .ln.del .gut, .diff .ln.del .sg { color:var(--err); }
.diff .ln.del .sg::before { content:"-"; }
.diff .ln.ctx .sg::before { content:" "; }
.diff .ln.ctx { color:var(--fg-dim); }
.diff .ln em {
  /* char-level highlight via bg color — Ink does this with Box bg around segments */
  font-style:normal; padding:0;
}
.diff .ln.add em { background:rgba(74,222,128,.32); color:#bef0c8; }
.diff .ln.del em { background:rgba(248,113,113,.32); color:#fbc8c8; text-decoration:line-through; }

/* shell output — like Ink: bordered Box with colored heading line */
.shell-out { font-size:12px; margin:1px 0 2px; }
.shell-out .h { color:var(--fg-dim); }
.shell-out .h .cmd { color:var(--fg); }
.shell-out .h .exit { margin-left:8px; }
.shell-out .h .exit.ok { color:var(--ok); }
.shell-out .h .exit.err { color:var(--err); }
.shell-out pre { margin:0; padding:0 0 0 9px; border-left:1px solid var(--line-soft); color:var(--fg); }
.shell-out pre .line.stderr { color:var(--err); }
.shell-out pre .line.dim { color:var(--fg-faint); }
.shell-out .truncated { color:var(--warn); font-size:11px; padding-left:9px; }
.shell-out .truncated .more { color:var(--primary); margin-left:6px; }

/* web_search — list, no cards */
.web-results { font-size:12px; }
.web-row { display:grid; grid-template-columns:1fr auto; gap:0 12px; padding:1px 0; }
.web-row .title { color:var(--primary); grid-column:1; }
.web-row .meta { color:var(--fg-ghost); font-size:11px; grid-column:2; }
.web-row .url { color:var(--fg-faint); font-size:11px; grid-column:1/-1; }
.web-row .snip { color:var(--fg-dim); font-size:12px; grid-column:1/-1; padding-left:1ch; }

/* semantic search */
.sem-list { font-size:12px; }
.sem-row { display:grid; grid-template-columns:5ch 1fr auto auto; gap:8px; padding:0; }
.sem-row .score { color:var(--brand); font-variant-numeric:tabular-nums; }
.sem-row .path { color:var(--fg); }
.sem-row .ln { color:var(--fg-faint); font-size:11px; }
.sem-row .preview { color:var(--fg-dim); grid-column:2/-1; padding-left:1ch; font-size:11px; }

/* plan — tree-style with checkbox status + branch lines + progress bar
   Ink primitives used:
     · Unicode tree chars ┣ ┗ ┃ for branches (1 cell each, terminal-native)
     · status glyphs ✓ ▸ ○ ✗ (color-coded)
     · char-based progress bar at the bottom
     · risk shown ONLY when ≥medium (low is implicit, omitted to reduce noise) */
.plan { font-size:12px; margin:3px 0 4px; }
.plan .h {
  display:flex; gap:8px; align-items:baseline;
  padding:0 0 2px;
}
.plan .h .glyph { color:var(--accent); }
.plan .h .title { color:var(--fg-strong); font-weight:500; }
.plan .h .progress {
  margin-left:auto; color:var(--fg-faint); font-size:11px;
  font-variant-numeric:tabular-nums;
}
.plan .h .progress .num { color:var(--primary); font-weight:500; }
.plan ul {
  margin:0; padding:0;
  list-style:none;
}
.plan li {
  display:grid;
  grid-template-columns:1ch 1ch 1fr auto;
  gap:0 8px; align-items:baseline;
  padding:0;
}
.plan li .branch { color:var(--line); user-select:none; }
.plan li .status { user-select:none; }
.plan li.done .status { color:var(--ok); }
.plan li.cur  .status { color:var(--primary); }
.plan li:not(.done):not(.cur) .status { color:var(--fg-ghost); }
.plan li.done .desc { color:var(--fg-faint); text-decoration:line-through; }
.plan li.cur  .desc { color:var(--fg-strong); }
.plan li:not(.done):not(.cur) .desc { color:var(--fg); }
.plan li .risk { font-size:11px; color:var(--fg-faint); white-space:nowrap; }
.plan li .risk.med  { color:var(--warn); }
.plan li .risk.high { color:var(--err); }
.plan .footer {
  display:grid; grid-template-columns:1ch 1fr auto; gap:0 8px;
  padding-top:2px; font-size:11px; align-items:baseline;
}
.plan .footer .pad { color:var(--line); }
.plan .footer .bar { color:var(--primary); letter-spacing:0; }
.plan .footer .bar .dim { color:var(--bg-sel); }
.plan .footer .stat { color:var(--fg-faint); }
.plan .footer .stat .num { color:var(--fg-strong); font-variant-numeric:tabular-nums; }

/* choice cards — just labeled rows, no card box */
.choices { display:flex; flex-direction:column; font-size:12px; }
.choice { padding:0; display:grid; grid-template-columns:5ch 1fr; gap:8px; }
.choice .key { color:var(--primary); }
.choice.active .key { color:var(--primary); font-weight:600; }
.choice.active .key::before { content:"▸ "; }
.choice .label { color:var(--fg-strong); }
.choice .desc { color:var(--fg-dim); grid-column:2; padding-left:0; font-size:11px; }

/* jobs — header + grid table + footer with action hints
   Columns: status icon (1 cell) · #id · command · port/exit meta · age
   Status icons: ● running (blink) · ✓ exited ok · ✗ failed
   Single Ink primitives: chars + fg color + per-row blink anim. No bg pills. */
.jobs { font-size:12px; margin:2px 0 4px; }
.jobs .h {
  display:flex; gap:8px; align-items:baseline;
  padding:0 0 2px;
}
.jobs .h .glyph { color:var(--brand); }
.jobs .h .title { color:var(--fg-strong); font-weight:500; }
.jobs .h .summary {
  margin-left:auto; color:var(--fg-faint); font-size:11px;
}
.jobs .h .summary .num { color:var(--fg-strong); font-variant-numeric:tabular-nums; }
.jobs .h .summary .num.running { color:var(--primary); }

.jobs .body {
  display:grid;
  grid-template-columns: 1ch 4ch 1fr auto auto;
  gap:0 10px; align-items:baseline;
}
.jobs .body .ico { user-select:none; }
.jobs .body .ico.running { color:var(--primary); animation: blink 1.2s steps(2) infinite; }
.jobs .body .ico.exited  { color:var(--ok); }
.jobs .body .ico.failed  { color:var(--err); }
.jobs .body .id   { color:var(--fg-ghost); font-variant-numeric:tabular-nums; }
.jobs .body .cmd  { color:var(--fg); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.jobs .body .cmd .args { color:var(--fg-faint); }
.jobs .body .meta { color:var(--fg-dim); font-size:11px; white-space:nowrap; }
.jobs .body .meta .port    { color:var(--brand); }
.jobs .body .meta .port + .port { margin-left:6px; }
.jobs .body .meta .exit-ok { color:var(--ok); }
.jobs .body .meta .exit-err{ color:var(--err); }
.jobs .body .meta .sep     { color:var(--fg-ghost); margin:0 5px; }
.jobs .body .age  { color:var(--fg-faint); font-size:11px; font-variant-numeric:tabular-nums; text-align:right; }

.jobs .footer {
  padding-top:3px;
  color:var(--fg-faint); font-size:11px;
}
.jobs .footer code { color:var(--primary); }
.jobs .footer .sep { color:var(--fg-ghost); margin:0 6px; }

/* notice rows — left bar + glyph + body. Mimics Ink event row. */
.notice {
  display:grid; grid-template-columns:14px auto 1fr auto; gap:8px;
  padding:0 12px; margin:0 0 4px;
  font-size:12px;
  position:relative;
  animation: fade-step 240ms steps(3);
}
.notice .bar { color:var(--accent-bar, var(--info)); }
.notice .bar::before { content:"▎"; }
.notice.info  { --accent-bar:var(--info); }
.notice.ok    { --accent-bar:var(--ok); }
.notice.warn  { --accent-bar:var(--warn); }
.notice.err   { --accent-bar:var(--err); }
.notice.hint  { --accent-bar:var(--brand); }
.notice .glyph { font-size:13px; }
.notice.info .glyph  { color:var(--info); }
.notice.ok .glyph    { color:var(--ok); }
.notice.warn .glyph  { color:var(--warn); }
.notice.err .glyph   { color:var(--err); }
.notice.hint .glyph  { color:var(--brand); }
.notice .body { color:var(--fg); }
.notice .body strong { color:var(--fg-strong); font-weight:600; }
.notice .actions { color:var(--fg-faint); font-size:11px; }

/* undo bar — character-cell countdown. Each cell ~250ms. */
.undo-bar {
  grid-column:1/-1;
  color:var(--brand);
  font-size:11px;
  letter-spacing:0;
  margin-top:2px;
  /* steps animation to swap chars frame by frame — JS does this */
}

/* hook rows */
.hook-row { font-size:11px; color:var(--fg-faint); padding-left:9px; border-left:1px solid var(--line-soft); display:grid; grid-template-columns:auto 1fr auto; gap:8px; }
.hook-row .glyph { color:var(--brand); }
.hook-row .label { color:var(--fg-dim); }
.hook-row .stat { color:var(--fg-ghost); }

/* subagent — nested loop indicator. Just deeper indent + tinted bar. */
.sub-loop { padding-left:9px; border-left:1px solid rgba(196,181,253,.3); margin:2px 0; font-size:12px; }
.sub-loop .h { color:var(--fg-dim); }
.sub-loop .h .glyph { color:var(--accent); margin-right:5px; }
.sub-loop .h .name { color:var(--fg); }
.sub-loop .h .meta { color:var(--fg-faint); font-size:11px; margin-left:8px; }
.sub-loop .body { color:var(--fg-dim); }
.sub-loop .body .lvl { color:var(--accent); }

/* paste chip — bracketed text, not pill */
.paste-chip { color:var(--accent); }
.paste-chip .glyph { margin-right:3px; }
.paste-chip::before { content:"["; color:var(--fg-ghost); }
.paste-chip::after { content:"]"; color:var(--fg-ghost); }

/* @url chip */
.url-chip { color:var(--brand); }
.url-chip::before { content:"["; color:var(--fg-ghost); }
.url-chip::after { content:"]"; color:var(--fg-ghost); }

/* /context bar chart — character-based stacked bar */
.ctx-chart { font-size:12px; }
.ctx-chart .h { color:var(--fg-dim); }
.ctx-chart .h .total { color:var(--fg-strong); font-variant-numeric:tabular-nums; font-weight:600; }
.ctx-chart .h .of { color:var(--fg-faint); margin-left:4px; }
.ctx-chart .h .pct { color:var(--accent); margin-left:8px; }
.ctx-chart .stacked { font-family:var(--mono); letter-spacing:0; }
.ctx-chart .stacked .system { color:var(--brand); }
.ctx-chart .stacked .tools  { color:var(--accent); }
.ctx-chart .stacked .log    { color:var(--primary); }
.ctx-chart .stacked .input  { color:var(--tool); }
.ctx-chart .stacked .free   { color:var(--bg-sel); }
.ctx-chart .legend { color:var(--fg-faint); font-size:11px; display:flex; gap:14px; flex-wrap:wrap; }
.ctx-chart .legend .item { display:inline-flex; gap:4px; }
.ctx-chart .legend .swatch.system { color:var(--brand); }
.ctx-chart .legend .swatch.tools  { color:var(--accent); }
.ctx-chart .legend .swatch.log    { color:var(--primary); }
.ctx-chart .legend .swatch.input  { color:var(--tool); }
.ctx-chart .legend .v { color:var(--fg); font-variant-numeric:tabular-nums; }

/* MCP progress — char-based bar */
.progress { font-size:12px; }
.progress .label { color:var(--fg); display:flex; gap:8px; align-items:baseline; }
.progress .label .spinner { color:var(--brand); width:1ch; }
.progress .label .stage { color:var(--fg-faint); font-size:11px; }
.progress .label .stat { color:var(--fg-faint); font-size:11px; margin-left:auto; }
.progress .bar { color:var(--primary); letter-spacing:0; font-variant-numeric:tabular-nums; }
.progress .bar .dim { color:var(--bg-sel); }

/* /loop — text card, no ring */
.loop-card {
  padding:0 12px; margin:0 0 6px;
  display:grid; grid-template-columns:14px auto 1fr auto auto; gap:8px;
  font-size:12px;
  border-left:0;       /* using bar glyph instead like turn */
}
.loop-card .bar { color:var(--accent); }
.loop-card .bar::before { content:"▎"; }
.loop-card .glyph { color:var(--accent); width:1ch; }   /* text counter, not conic */
.loop-card .pmpt { color:var(--fg); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.loop-card .pmpt .label { color:var(--fg-faint); margin-right:5px; font-size:11px; }
.loop-card .next { color:var(--fg-dim); font-size:11px; font-variant-numeric:tabular-nums; }
.loop-card .next .num { color:var(--fg-strong); }
.loop-card .stop { color:var(--err); font-size:11px; }

/* quit-armed banner */
.quit-arm {
  padding:0 12px; margin:0 0 4px;
  display:grid; grid-template-columns:14px auto 1fr auto; gap:8px;
  font-size:12px;
  animation: fade-step 240ms steps(3);
}
.quit-arm .bar { color:var(--err); }
.quit-arm .bar::before { content:"▎"; }
.quit-arm .glyph { color:var(--err); }
.quit-arm .body { color:var(--fg); }
.quit-arm .body strong { color:var(--fg-strong); }
.quit-arm .timer { color:var(--err); font-variant-numeric:tabular-nums; font-weight:600; }

/* replay banner */
.replay-banner {
  padding:0 12px; margin:0 0 4px;
  display:grid; grid-template-columns:14px auto 1fr auto; gap:8px;
  font-size:12px;
}
.replay-banner .bar { color:var(--accent); }
.replay-banner .bar::before { content:"▎"; }
.replay-banner .glyph { color:var(--accent); }
.replay-banner .body { color:var(--fg); }
.replay-banner .body strong { color:var(--fg-strong); }
.replay-banner .badge { color:var(--accent); margin-left:6px; }
.replay-banner .badge::before { content:"["; color:var(--fg-ghost); }
.replay-banner .badge::after  { content:"]"; color:var(--fg-ghost); }
.replay-banner .esc { color:var(--fg-faint); font-size:11px; }

/* mcp failed — same as a notice but typed */
.mcp-fail {
  padding:0 12px; margin:0 0 4px; font-size:12px;
  display:grid; grid-template-columns:14px 1fr; gap:8px;
}
.mcp-fail .bar { color:var(--err); }
.mcp-fail .bar::before { content:"▎"; }
.mcp-fail .h { color:var(--fg-dim); }
.mcp-fail .h .glyph { color:var(--err); margin-right:5px; }
.mcp-fail .h .name { color:var(--fg-strong); }
.mcp-fail .h .attempt { color:var(--fg-faint); margin-left:8px; font-size:11px; }
.mcp-fail .reason { color:var(--fg-dim); padding-left:1ch; }
.mcp-fail .reason code { color:var(--primary); }
.mcp-fail .actions { color:var(--fg-faint); font-size:11px; padding-left:1ch; }
.mcp-fail .actions code { color:var(--primary); }

/* /think dump */
.think-dump { font-size:12px; padding:0 1ch; border-left:1px solid rgba(196,181,253,.25); color:var(--fg-dim); white-space:pre-wrap; }
.think-dump .h { color:var(--accent); }
.think-dump .h .turn-ref { color:var(--fg); margin-left:5px; }
.think-dump .h .meta { color:var(--fg-faint); margin-left:8px; font-size:11px; }

/* prompt area */
.prompt-wrap {
  border-top:1px solid var(--line-soft);
  padding:6px 8px;
}
.prompt {
  display:grid; grid-template-columns:auto 1fr auto; gap:8px;
  align-items:start; padding:2px 0;
}
.prompt.focused .lead .arr { color:var(--primary); }
.prompt .lead { color:var(--brand); user-select:none; line-height:1.4; }
.prompt .lead .arr { color:var(--primary); margin-left:4px; }
.prompt .field {
  background:transparent; border:0; outline:0;
  color:var(--fg-strong); font:inherit; resize:none;
  caret-color:var(--primary);
  width:100%; min-height:18px;
}
.prompt .placeholder { color:var(--fg-ghost); position:absolute; pointer-events:none; }
.prompt .send { color:var(--fg-faint); font-size:11px; }
.kbd { color:var(--fg-dim); }
.kbd::before { content:"["; color:var(--fg-ghost); }
.kbd::after  { content:"]"; color:var(--fg-ghost); }
.hintbar {
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  padding:2px 0 0; font-size:11px; color:var(--fg-faint);
}
.hintbar .grp { display:inline-flex; align-items:center; gap:4px; }
.hintbar .sep { color:var(--fg-ghost); }

/* overlays — slash palette / pickers. In Ink, overlays REPLACE the bottom
   region of the log; they don't float. The behind-content stays visible
   above but no blur. */
.overlay {
  position:absolute; left:0; right:0; bottom:24px;       /* sits above prompt */
  background:var(--bg-shell);
  border-top:1px solid var(--line);
  padding:0;
  display:none;
}
.overlay.show { display:block; animation: fade-step 240ms steps(3); }

.palette {
  font-size:12px;
}
.palette .head {
  display:flex; align-items:center; gap:8px;
  padding:4px 12px;
  border-bottom:1px solid var(--line-soft);
  color:var(--fg-dim);
}
.palette .head .glyph { color:var(--accent); }
.palette .head input {
  flex:1; background:transparent; border:0; outline:0; font:inherit; color:var(--fg-strong);
  caret-color:var(--accent);
}
.palette .head .esc { color:var(--fg-faint); font-size:11px; }
.palette .list { max-height:240px; overflow-y:auto; padding:2px 0; }
.palette .list::-webkit-scrollbar { width:4px; } .palette .list::-webkit-scrollbar-thumb { background:var(--bg-sel); }
.palette .item {
  display:grid; grid-template-columns:auto 1fr auto; gap:12px;
  padding:0 12px; cursor:pointer;
  color:var(--fg-dim);
}
.palette .item.active { background:var(--bg-sel); color:var(--fg-strong); }
.palette .item.active::before { content:"▸"; color:var(--primary); position:absolute; margin-left:-9px; }
.palette .item .cmd { color:var(--accent); min-width:14ch; }
.palette .item.active .cmd { color:var(--primary); }
.palette .item .desc { color:var(--fg-dim); }
.palette .item.active .desc { color:var(--fg); }
.palette .item .hint { color:var(--fg-ghost); font-size:11px; }
.palette .foot { padding:3px 12px; border-top:1px solid var(--line-soft); color:var(--fg-faint); font-size:11px; display:flex; gap:14px; }
.palette .foot .sep { color:var(--fg-ghost); }

/* @file picker variant */
.palette.atfiles .item { grid-template-columns:5ch 1fr auto; gap:8px; }
.palette.atfiles .item .ext { color:var(--fg-faint); font-size:11px; }
.palette.atfiles .item .path { color:var(--fg); }
.palette.atfiles .item.active .path { color:var(--fg-strong); }
.palette.atfiles .item .path strong { color:var(--primary); font-weight:normal; }   /* Ink: highlight via primary fg */
.palette.atfiles .item .size { color:var(--fg-faint); font-size:11px; }

/* checkpoint picker */
.palette.cps .row { display:grid; grid-template-columns:9ch 1fr 7ch; gap:12px; padding:0 12px; }
.palette.cps .row.active { background:var(--bg-sel); }
.palette.cps .row.active::before { content:"▸"; color:var(--primary); position:absolute; margin-left:-9px; }
.palette.cps .row .when { color:var(--fg-faint); font-size:11px; font-variant-numeric:tabular-nums; }
.palette.cps .row .name { color:var(--fg); }
.palette.cps .row.active .name { color:var(--fg-strong); }
.palette.cps .row .files { color:var(--fg-dim); font-size:11px; }
.palette.cps .row .size { color:var(--fg-ghost); font-size:11px; text-align:right; }
.palette.cps .head .glyph { color:var(--brand); }

/* sessions picker */
.palette.sess .row { display:grid; grid-template-columns:1fr auto auto; gap:12px; padding:0 12px; align-items:baseline; }
.palette.sess .row.active { background:var(--bg-sel); }
.palette.sess .row.active::before { content:"▸"; color:var(--primary); position:absolute; margin-left:-9px; }
.palette.sess .row .name { color:var(--fg); }
.palette.sess .row.active .name { color:var(--fg-strong); }
.palette.sess .row .name .marker { color:var(--primary); margin-right:5px; }
.palette.sess .row .last { color:var(--fg-faint); font-size:11px; }
.palette.sess .row .turns { color:var(--fg-ghost); font-size:11px; }

/* model picker */
.palette.models .item .cmd { color:var(--primary); }
.palette.models .item .badge { font-size:11px; }
.palette.models .item .badge.cur { color:var(--ok); }
.palette.models .item .badge.pro { color:var(--accent); }
.palette.models .item .badge::before { content:"["; color:var(--fg-ghost); }
.palette.models .item .badge::after  { content:"]"; color:var(--fg-ghost); }

.palette.skills .item .cmd { color:var(--brand); }
.palette.skills .item .scope { color:var(--fg-faint); font-size:11px; }

/* history list */
.palette.hist .row {
  display:grid; grid-template-columns:5ch 6ch 1fr 10ch 9ch; gap:8px; padding:0 12px; align-items:baseline; font-size:12px;
}
.palette.hist .row.active { background:var(--bg-sel); }
.palette.hist .row.active::before { content:"▸"; color:var(--primary); position:absolute; margin-left:-9px; }
.palette.hist .id { color:var(--fg-ghost); }
.palette.hist .when { color:var(--fg-faint); font-size:11px; }
.palette.hist .files { color:var(--fg); }
.palette.hist .src { color:var(--fg-faint); font-size:11px; }
.palette.hist .stat { font-size:11px; }
.palette.hist .stat.applied { color:var(--ok); }
.palette.hist .stat.undone  { color:var(--err); }
.palette.hist .stat::before { content:"["; color:var(--fg-ghost); }
.palette.hist .stat::after  { content:"]"; color:var(--fg-ghost); }

/* modals — REPLACE log content. No floating, no backdrop blur.
   This is exactly what Ink does: render a Box centered, with the rest
   of the log re-rendered with dimColor. */
.modal-wrap {
  display:none; position:absolute; inset:0; z-index:11;
  background:rgba(7,10,16,.75);  /* solid dim, no blur */
  flex-direction:column;
}
.modal-wrap.show { display:flex; animation: fade-step 240ms steps(3); }

.modal {
  margin:auto; width:min(640px, calc(100% - 32px));
  background:var(--bg-shell);
  border:1px solid var(--line);
  /* No box-shadow */
  font-size:12px;
}
.modal .top {
  display:flex; align-items:center; gap:8px;
  padding:4px 12px;
  border-bottom:1px solid var(--line-soft);
}
.modal .top .glyph { font-size:13px; }
.modal .top h3 { margin:0; color:var(--fg-strong); font-size:12px; font-weight:600; }
.modal .top .path { margin-left:auto; color:var(--fg-faint); font-size:11px; }
.modal .body { padding:6px 12px; color:var(--fg); }
.modal .body.tight { padding:0; }
.modal .actions { display:flex; gap:8px; padding:4px 12px; border-top:1px solid var(--line-soft); justify-content:flex-end; }
.btn {
  background:transparent; border:0; color:var(--fg); font:inherit; font-size:12px;
  padding:0; cursor:pointer;
}
.btn::before { content:"["; color:var(--fg-ghost); }
.btn::after  { content:"]"; color:var(--fg-ghost); }
.btn.primary { color:var(--primary); }
.btn.primary::before, .btn.primary::after { color:var(--primary); }
.btn.danger  { color:var(--err); }
.btn.warn    { color:var(--warn); }
.btn .kbd { color:var(--fg-faint); font-size:11px; margin-left:5px; }
.btn .kbd::before, .btn .kbd::after { content:""; }

/* shell-confirm cmd line */
.cmd-pre { padding:6px 12px; color:var(--fg-strong); font-size:12px; border-bottom:1px solid var(--line-soft); }
.cmd-pre .prompt-glyph { color:var(--primary); margin-right:5px; }
.allowlist { padding:3px 12px; color:var(--fg-dim); font-size:11px; border-bottom:1px solid var(--line-soft); }
.allowlist code { color:var(--primary); }

/* walk progress */
.walk-progress { padding:3px 12px; color:var(--fg-dim); font-size:11px; border-bottom:1px solid var(--line-soft); display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:baseline; }
.walk-progress .pos { color:var(--fg-strong); font-variant-numeric:tabular-nums; }
.walk-progress .bar { color:var(--primary); letter-spacing:0; }
.walk-progress .bar .dim { color:var(--bg-sel); }

/* setup wizard — vertical steps */
.wizard { padding:24px 32px; height:100%; display:flex; flex-direction:column; font-size:12px; }
.wizard .stepper { display:flex; gap:0; margin-bottom:18px; color:var(--fg-ghost); }
.wizard .step-dot { color:var(--bg-sel); font-size:13px; }
.wizard .step-dot.cur  { color:var(--primary); }
.wizard .step-dot.done { color:var(--brand); }
.wizard .step-dot::before { content:"●"; }
.wizard .step-dot + .step-dot { margin-left:4px; }
.wizard .h { font-size:16px; color:var(--fg-strong); font-weight:600; margin-bottom:4px; }
.wizard .sub { color:var(--fg-dim); margin-bottom:18px; max-width:520px; }
.wizard .sub code { color:var(--primary); }
.wizard .input-row { display:grid; grid-template-columns:auto 1fr; gap:8px; max-width:520px; padding:4px 8px; border:1px solid var(--line); align-items:baseline; }
.wizard .input-row .lead { color:var(--primary); }
.wizard .input-row input { background:transparent; border:0; outline:0; font:inherit; color:var(--fg-strong); width:100%; }
.wizard .actions-row { margin-top:auto; display:flex; gap:14px; padding-top:14px; border-top:1px solid var(--line-soft); align-items:baseline; }
.wizard .actions-row .skip { color:var(--fg-faint); font-size:11px; margin-left:auto; }

/* stats panel — rendered IN the log (Ink: open via /stats slash, not hover) */
.stats-inline {
  border:1px solid var(--line);
  margin:0 12px 6px; padding:0;
  font-size:12px;
}
.stats-inline .h { padding:3px 12px; color:var(--fg-dim); border-bottom:1px solid var(--line-soft); }
.stats-inline .h .glyph { color:var(--brand); margin-right:5px; }
.stats-inline .h .title { color:var(--fg-strong); }
.stats-inline .grid { display:grid; grid-template-columns:repeat(2, 1fr); }
.stats-inline .cell { padding:3px 12px; display:flex; justify-content:space-between; gap:10px; align-items:baseline; border-right:1px solid var(--line-soft); }
.stats-inline .cell:nth-child(2n) { border-right:0; }
.stats-inline .cell .k { color:var(--fg-faint); font-size:11px; }
.stats-inline .cell .v { color:var(--fg-strong); font-variant-numeric:tabular-nums; }
.stats-inline .cell .v.accent { color:var(--primary); }
.stats-inline .cell .v.ok { color:var(--ok); }
.stats-inline .cell .delta { color:var(--fg-ghost); font-size:11px; }

/* welcome */
.welcome { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
.welcome .mark {
  font-size:30px; letter-spacing:.04em; font-weight:600;
  background:linear-gradient(90deg,var(--grad-1),var(--grad-2),var(--grad-3),var(--grad-4),var(--grad-5),var(--grad-6),var(--grad-7),var(--grad-8));
  -webkit-background-clip:text; background-clip:text; color:transparent;
  margin-bottom:6px;
}
.welcome .tagline { color:var(--fg-dim); font-size:12px; margin-bottom:18px; }
.welcome .quick { display:grid; grid-template-columns:auto 1fr; gap:0 14px; column-gap:14px; row-gap:1px; max-width:480px; }
.welcome .quick .cmd { color:var(--accent); font-weight:600; }
.welcome .quick .desc { color:var(--fg-dim); }
.welcome .tip { color:var(--fg-ghost); font-size:11px; margin-top:14px; }

/* note panel */
.note { margin-top:16px; padding:12px 14px; background:var(--bg-shell); border:1px solid var(--line); font-size:12px; color:var(--fg-dim); }
.note .head { display:flex; gap:8px; flex-wrap:wrap; align-items:baseline; margin-bottom:6px; }
.note .head h4 { margin:0; color:var(--fg-strong); font-size:12px; font-weight:600; }
.note .head .group-tag { color:var(--brand); font-size:11px; }
.note .head .group-tag::before { content:"["; color:var(--fg-ghost); }
.note .head .group-tag::after  { content:"]"; color:var(--fg-ghost); }
.note .head .feas { font-size:11px; }
.note .head .feas::before { content:"·"; color:var(--fg-ghost); margin-right:4px; }
.note .head .feas.full     { color:var(--ok); }
.note .head .feas.partial  { color:var(--warn); }
.note .head .feas.newfeat  { color:var(--accent); }
.note .head .lives { color:var(--fg-faint); font-size:11px; margin-left:auto; }
.note code { color:var(--primary); }

@media (max-width:980px) { .shell { grid-template-columns:1fr; } .sidebar { position:static; max-height:none; } }
</style>
</head>
<body>
<div class="shell">

  <div class="headline">
    <h1><span class="mark">◈ reasonix</span> · TUI redesign — Ink-realistic</h1>
    <span class="sub">stripped to what Ink can actually render</span>
    <span class="compare">compare ideal: <a href="tui-redesign.html">tui-redesign.html</a></span>
  </div>

  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">
    <div class="term" id="term">

      <!-- topbar — single-line status row -->
      <div class="topbar" id="topbar">
        <span class="brand"><span class="glyph">◈</span>reasonix</span>
        <span class="sep">·</span>
        <span class="root">myproject</span>
        <span class="sep">›</span>
        <span class="session">code-myproject</span>
        <span class="spacer"></span>
        <span class="pill mode-auto" id="modepill"><span class="lb">[</span>auto<span class="rb">]</span></span>
        <span class="pill cost" id="costpill"><span class="lb">$</span><span class="num">0.024</span><span class="sub"> / $5.00</span></span>
        <span class="pill cache" id="cachepill"><span class="sub">cache</span><span class="bar">██████████<span class="dim">░░</span></span><span class="num">87%</span></span>
      </div>

      <div class="log" id="log"></div>

      <div class="prompt-wrap" id="promptwrap">
        <div class="prompt" id="prompt">
          <span class="lead">▎<span class="arr">›</span></span>
          <textarea class="field" rows="1" placeholder="type a message · @file · /cmd · !shell"></textarea>
          <span class="send"><span class="kbd">⏎</span> send</span>
        </div>
        <div class="hintbar" id="hintbar">
          <span class="grp"><span class="kbd">shift+tab</span> mode</span>
          <span class="sep">·</span>
          <span class="grp"><span class="kbd">ctrl+j</span> newline</span>
          <span class="sep">·</span>
          <span class="grp"><span class="kbd">esc</span> abort</span>
          <span class="sep">·</span>
          <span class="grp"><span class="kbd">u</span> undo</span>
          <span class="sep">·</span>
          <span class="grp"><span class="kbd">ctrl+c×2</span> quit</span>
        </div>
      </div>

      <div class="overlay" id="overlay"></div>
      <div class="modal-wrap" id="modalwrap"></div>

    </div>

    <div class="note" id="note"></div>
  </main>

</div>

<script>
const log = document.getElementById('log');
const overlay = document.getElementById('overlay');
const modalwrap = document.getElementById('modalwrap');
const note = document.getElementById('note');
const sidebarEl = document.getElementById('sidebar');
const promptEl = document.getElementById('prompt');
const promptField = promptEl.querySelector('.field');

/* ---------- helpers ---------- */
function turn(role, html, opts={}) {
  const div = document.createElement('div');
  div.className = 'turn ' + role + (opts.streaming?' streaming':'');
  const glyphMap = { user:'◇', assistant:'◆', system:'·', tool:'▣', error:'✦', warn:'▲' };
  const glyph = opts.glyph || glyphMap[role] || '·';
  const who = opts.who || role;
  const meta = [];
  if (opts.r1)    meta.push('<span class="badge r1">R1↯</span>');
  if (opts.mcp)   meta.push(`<span class="badge mcp">mcp:${opts.mcp}</span>`);
  if (opts.model) meta.push(`<span class="model">${opts.model}</span>`);
  if (opts.time)  meta.push(`<span>${opts.time}</span>`);
  div.innerHTML = `
    <span class="bar"></span>
    <div class="turn-content">
      <div class="turn-head">
        <span class="who"><span class="glyph">${glyph}</span>${who}</span>
        <span class="meta">${meta.join('')}</span>
      </div>
      <div class="turn-body">${html}</div>
    </div>
  `;
  return div;
}
function notice(kind, glyph, html, actions='') {
  const el = document.createElement('div');
  el.className = `notice ${kind}`;
  el.innerHTML = `<span class="bar"></span><span class="glyph">${glyph}</span><div class="body">${html}</div>${actions?`<div class="actions">${actions}</div>`:''}`;
  return el;
}
function tool(state, name, args, stat, badge='') {
  const ico = state==='run' ? `<span class="spinner" data-spin>◐</span>` : state==='err' ? '▥' : '▣';
  return `<div class="tool ${state}">
    <span class="ico">${ico}</span>
    <span class="name">${name}${badge?` <span class="badge">[${badge}]</span>`:''}</span>
    <span class="args">${args}</span>
    <span class="stat">${stat||''}</span>
  </div>`;
}
function diffBlock(path, lines, startLine=40) {
  const adds = lines.filter(l=>l[0]==='+').length;
  const dels = lines.filter(l=>l[0]==='-').length;
  let html = `<div class="diff"><div class="h"><span class="path">${path}</span><span class="stats"><span class="del">-${dels}</span> <span class="add">+${adds}</span></span></div><pre>`;
  let n = startLine;
  for (const l of lines) {
    const cls = l[0]==='+'?'add': l[0]==='-'?'del':'ctx';
    const txt = l.slice(1).replace(/</g,'&lt;');
    html += `<div class="ln ${cls}"><span class="gut">${n}</span><span class="sg"></span><span>${txt||' '}</span></div>`;
    n++;
  }
  return html + `</pre></div>`;
}
function shellOut(cmd, exitCode, body, truncated=false) {
  const ec = exitCode === 0 ? `<span class="exit ok">→ exit 0 · 0.4s</span>` : `<span class="exit err">→ exit ${exitCode}</span>`;
  return `<div class="shell-out">
    <div class="h"><span class="cmd">$ ${cmd}</span>${ec}</div>
    <pre>${body}</pre>
    ${truncated?`<div class="truncated">▲ truncated · 248 of 4192 lines<span class="more">/tool 1 to view full</span></div>`:''}
  </div>`;
}

/* progress char-bar — Ink does this with literal █ / ░ chars */
function charBar(pct, width=24) {
  const filled = Math.round(width * pct / 100);
  return `<span class="bar">${'█'.repeat(filled)}<span class="dim">${'░'.repeat(width-filled)}</span></span>`;
}

/* Jobs renderer — header + table + footer.
   jobs = [{ id, cmd, args, state: 'running'|'exited'|'failed', age, ports?, exitCode?, note? }] */
function jobsBlock(jobs) {
  const STATE_GLYPH = { running:'●', exited:'✓', failed:'✗' };
  const running = jobs.filter(j => j.state === 'running').length;
  let html = `<div class="jobs">
    <div class="h">
      <span class="glyph">◈</span>
      <span class="title">jobs</span>
      <span class="summary"><span class="num running">${running}</span> running · <span class="num">${jobs.length}</span> total</span>
    </div>
    <div class="body">`;
  for (const j of jobs) {
    const ico = STATE_GLYPH[j.state] || '○';
    let metaParts = [];
    if (j.state === 'running' && j.ports) {
      metaParts.push(j.ports.map(p => `<span class="port">:${p}</span>`).join(''));
    }
    if (j.state === 'exited') {
      metaParts.push(`<span class="exit-ok">exit ${j.exitCode ?? 0}</span>`);
    }
    if (j.state === 'failed') {
      metaParts.push(`<span class="exit-err">exit ${j.exitCode ?? 1}</span>`);
    }
    if (j.note) metaParts.push(`<span class="sep">·</span>${j.note}`);
    const meta = metaParts.join('');
    html += `
      <span class="ico ${j.state}">${ico}</span>
      <span class="id">#${j.id}</span>
      <span class="cmd">${j.cmd}${j.args?` <span class="args">${j.args}</span>`:''}</span>
      <span class="meta">${meta}</span>
      <span class="age">${j.age}</span>`;
  }
  html += `</div>
    <div class="footer">
      <code>/logs &lt;id&gt;</code> tail
      <span class="sep">·</span>
      <code>/kill &lt;id&gt;</code> SIGTERM → SIGKILL
      <span class="sep">·</span>
      <code>/jobs --all</code> archived
    </div>
  </div>`;
  return html;
}

/* Plan renderer — tree with status checkboxes.
   steps = [{ desc, status: 'done'|'cur'|'pending', risk: 'low'|'med'|'high' }] */
function planBlock(title, steps, opts={}) {
  const STATUS_GLYPH = { done:'✓', cur:'▸', pending:'○', failed:'✗' };
  const done = steps.filter(s => s.status === 'done').length;
  const total = steps.length;
  const pct = total > 0 ? Math.round((done/total) * 100) : 0;
  const meta = opts.meta || `est ${opts.estTurns || 8} turns`;
  let html = `<div class="plan">
    <div class="h">
      <span class="glyph">◇</span>
      <span class="title">${title}</span>
      <span class="progress"><span class="num">${done}</span>/${total} · ${meta}</span>
    </div>
    <ul>`;
  steps.forEach((s, i) => {
    const branch = (i === total - 1) ? '┗' : '┣';
    const cls = s.status === 'done' ? 'done' : s.status === 'cur' ? 'cur' : '';
    const glyph = STATUS_GLYPH[s.status] || '○';
    const risk = (s.risk === 'med' || s.risk === 'high')
      ? `<span class="risk ${s.risk}">⚠ ${s.risk}</span>`
      : '<span class="risk"></span>';
    html += `<li class="${cls}"><span class="branch">${branch}</span><span class="status">${glyph}</span><span class="desc">${s.desc}</span>${risk}</li>`;
  });
  html += `</ul>
    <div class="footer">
      <span class="pad"> </span>
      ${charBar(pct, 24)}
      <span class="stat"><span class="num">${pct}%</span> · ${done} of ${total} done</span>
    </div>
  </div>`;
  return html;
}
function stackedBar(parts, width=48) {
  // parts = [{cls:'system', pct:5}, ...]
  let html = '<span class="stacked">';
  let total = 0;
  for (const p of parts) {
    const w = Math.round(width * p.pct / 100);
    total += w;
    html += `<span class="${p.cls}">${'█'.repeat(w)}</span>`;
  }
  html += `<span class="free">${'░'.repeat(Math.max(0,width-total))}</span>`;
  return html + '</span>';
}
function setOverlay(html, klass='') {
  overlay.innerHTML = html;
  overlay.className = 'overlay show' + (klass?' '+klass:'');
}
function setModal(html) {
  modalwrap.innerHTML = `<div class="modal">${html}</div>`;
  modalwrap.classList.add('show');
}

/* sidebar */
const GROUPS = [
  { id:'chat', title:'conversation' },
  { id:'tools', title:'tools' },
  { id:'confirms', title:'confirms / modals' },
  { id:'pickers', title:'pickers / overlays' },
  { id:'chrome', title:'chrome / status' },
  { id:'special', title:'special views' },
];
function buildSidebar() {
  let html = '';
  for (const g of GROUPS) {
    html += `<h3>${g.title}</h3>`;
    for (const [id, s] of Object.entries(STATES)) {
      if (s.group !== g.id) continue;
      html += `<div class="item" data-state="${id}"><span class="glyph">›</span>${s.label}</div>`;
    }
  }
  html += `<div class="meta">terminal-realistic · click to switch · animations restart</div>`;
  sidebarEl.innerHTML = html;
  sidebarEl.querySelectorAll('.item').forEach(el => el.addEventListener('click', () => activate(el.dataset.state)));
}

/* spinner frame swap (Ink useEffect setInterval pattern) */
const SPIN_FRAMES = ['◐','◓','◑','◒'];
let spinTimer = null;
function startSpinners() {
  stopSpinners();
  let idx = 0;
  spinTimer = setInterval(() => {
    document.querySelectorAll('[data-spin]').forEach(el => {
      const isLoopRing = el.textContent === '↻' || el.textContent === '↺';
      if (isLoopRing) {
        const frames = ['↻','↺'];
        el.textContent = frames[idx % frames.length];
      } else {
        el.textContent = SPIN_FRAMES[idx % SPIN_FRAMES.length];
      }
    });
    idx++;
  }, 200);
}
function stopSpinners() { if (spinTimer) { clearInterval(spinTimer); spinTimer = null; } }

/* marquee char shifter */
let marqueeTimer = null;
function startMarquee() {
  stopMarquee();
  let pos = 0;
  marqueeTimer = setInterval(() => {
    document.querySelectorAll('[data-marquee]').forEach(el => {
      const w = 12;
      const arr = Array(w).fill('░');
      arr[pos % w] = '▒';
      arr[(pos+1) % w] = '▓';
      arr[(pos+2) % w] = '█';
      arr[(pos+3) % w] = '▓';
      arr[(pos+4) % w] = '▒';
      el.textContent = arr.join('');
    });
    pos++;
  }, 120);
}
function stopMarquee() { if (marqueeTimer) { clearInterval(marqueeTimer); marqueeTimer = null; } }

/* undo bar countdown — char by char, every 250ms shrink 1 cell */
let undoTimer = null;
function startUndoCountdown() {
  if (undoTimer) clearInterval(undoTimer);
  let cells = 20;
  const bar = document.getElementById('undobar');
  if (!bar) return;
  undoTimer = setInterval(() => {
    cells--;
    if (cells <= 0) { clearInterval(undoTimer); undoTimer = null; bar.textContent = ''; return; }
    bar.textContent = '█'.repeat(cells) + '░'.repeat(20-cells);
  }, 250);
}

/* streaming reveal */
let streamTimer = null;
function stopStream() { if (streamTimer) { clearInterval(streamTimer); streamTimer = null; } }
const STREAM_TEXT = `:\n\n  - empty string ("") → expect TypeError\n  - undefined → expect TypeError\n  - numeric 0 → expect TypeError\n\nWriting them now.`;
function startStream() {
  stopStream();
  let i = 0;
  streamTimer = setInterval(() => {
    const body = log.querySelector('.turn.streaming .turn-body');
    if (!body) { stopStream(); return; }
    if (i >= STREAM_TEXT.length) { stopStream(); return; }
    body.append(STREAM_TEXT[i++]);
  }, 25);
}

function activate(stateId) {
  stopStream();
  log.style.padding = '6px 0';
  log.innerHTML = '';
  overlay.className = 'overlay';
  overlay.innerHTML = '';
  modalwrap.className = 'modal-wrap';
  modalwrap.innerHTML = '';
  document.getElementById('costpill').className = 'pill cost';
  document.getElementById('costpill').innerHTML = '<span class="lb">$</span><span class="num">0.024</span><span class="sub"> / $5.00</span>';
  ['planpill','dashpill','updpill'].forEach(id => { const e = document.getElementById(id); if (e) e.remove(); });

  sidebarEl.querySelectorAll('.item').forEach(el => el.classList.toggle('active', el.dataset.state === stateId));

  const s = STATES[stateId];
  if (!s) return;
  s.render();
  startSpinners();
  startMarquee();

  const feasMap = {
    full:    { label:'full · directly Ink-renderable', cls:'full' },
    partial: { label:'partial · same shape, simpler today', cls:'partial' },
    new:     { label:'new feature · needs code', cls:'newfeat' },
  };
  const f = feasMap[s.feasibility || 'full'];
  const lives = s.lives ? `<span class="lives">lives in: ${s.lives}</span>` : '';
  note.innerHTML = `
    <div class="head">
      <h4>${s.label}</h4>
      <span class="group-tag">${s.group}</span>
      <span class="feas ${f.cls}">${f.label}</span>
      ${lives}
    </div>
    <div class="body">${s.note}</div>
  `;
}

/* prompt focus */
promptField.addEventListener('focus', () => promptEl.classList.add('focused'));
promptField.addEventListener('blur',  () => promptEl.classList.remove('focused'));

/* close overlay/modal on backdrop click */
overlay.addEventListener('click', e => { if (e.target === overlay) activate('conversation'); });
modalwrap.addEventListener('click', e => { if (e.target === modalwrap) activate('conversation'); });

/* mode pill cycle */
const modes = [{n:'review',c:'mode-review'},{n:'auto',c:'mode-auto'},{n:'yolo',c:'mode-yolo'}];
let modeIdx = 1;
document.getElementById('modepill').addEventListener('click', () => {
  modeIdx = (modeIdx + 1) % modes.length;
  const m = modes[modeIdx];
  const pill = document.getElementById('modepill');
  pill.className = 'pill ' + m.c;
  pill.innerHTML = `<span class="lb">[</span>${m.n}<span class="rb">]</span>`;
});

buildSidebar();
activate('welcome');
