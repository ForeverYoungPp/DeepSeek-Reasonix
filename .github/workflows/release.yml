name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.40.0). Required when running manually."
        required: true
        type: string

permissions:
  contents: write

jobs:
  bundle:
    name: bundle (${{ matrix.target.label }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: ubuntu-22.04, label: "linux-x64", rust: "x86_64-unknown-linux-gnu" }
          - { os: macos-14, label: "macos-arm64", rust: "aarch64-apple-darwin" }
          - { os: macos-13, label: "macos-x64", rust: "x86_64-apple-darwin" }
          - { os: windows-latest, label: "windows-x64", rust: "x86_64-pc-windows-msvc" }
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust (${{ matrix.target.rust }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          key: ${{ matrix.target.label }}

      - name: Install Linux bundle deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install root deps
        run: npm ci

      - name: Sync desktop version from tag
        run: node scripts/sync-desktop-version.mjs "${{ steps.tag.outputs.name }}"

      - name: Build CLI bundle (dist/)
        run: npm run build

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Download bundled Node runtime
        working-directory: desktop
        run: npm run bundle:node

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: Reasonix ${{ steps.tag.outputs.name }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target.rust }}
